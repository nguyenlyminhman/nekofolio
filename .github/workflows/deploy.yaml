name: Deploy Nekofolio UI - Next.js Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  ci-build:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          retention-days: 1
          path: |
            .next
            public
            package.json
            package-lock.json
            next.config.js
            ecosystem.config.js

  cd-deploy:
    needs: ci-build
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://man-nguyen.com

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build

      # ✅ THAY scp-action BẰNG rsync qua SSH tunnel
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy files via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            .next/ public/ package.json package-lock.json next.config.js ecosystem.config.js \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/apps/nekofolio-ui/

      - name: Restart Next.js application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -euxo pipefail

            APP_DIR=~/apps/nekofolio-ui
            APP_NAME=nekofolio-ui

            echo "===== Go to app directory ====="
            cd $APP_DIR

            echo "===== Node version ====="
            node -v && npm -v

            echo "===== Install dependencies ====="
            npm install --omit=dev

            echo "===== Delete old process if exists ====="
            pm2 delete $APP_NAME || true

            echo "===== Start Next.js ====="
            pm2 start npm --name $APP_NAME -- start

            echo "===== Wait app startup ====="
            sleep 10

            echo "===== Health check ====="
            curl -sf http://127.0.0.1:3000 || (pm2 logs $APP_NAME --lines 50 --nostream; exit 1)

            echo "===== Save PM2 ====="
            pm2 save

            echo "===== Final PM2 status ====="
            pm2 status