name: Deploy Nekofolio - Production Standard

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ closed ]

jobs:
  # --- GIAI ĐOẠN CI: BUILD & TEST ---
  ci-build:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test --if-present

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            .next/
            public/
            package.json
            package-lock.json
            next.config.*
          retention-days: 1

  # --- GIAI ĐOẠN CD: DEPLOY VỚI APPROVAL ---
  cd-deploy:
    needs: ci-build
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://man-nguyen.com

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Debug artifact structure
        run: find . -type f | head -30

      - name: Deploy to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next/,public/,package.json,package-lock.json,next.config.*"
          target: "~/apps/nekofolio-ui"

      - name: Restart Application via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ~/apps/nekofolio-ui

            echo "=== Directory structure ==="
            ls -la

            echo "Installing production dependencies..."
            npm install --omit=dev

            echo "Starting/Reloading application..."
            if pm2 describe nekofolio-ui > /dev/null 2>&1; then
              pm2 reload nekofolio-ui
            else
              pm2 start npm --name nekofolio-ui -- start
            fi

            echo "Waiting for app to be ready..."
            sleep 5

            echo "Health check..."
            curl -sf http://localhost:3000 || {
              echo "Health check failed! Printing logs..."
              pm2 logs nekofolio-ui --lines 30 --nostream
              exit 1
            }

            echo "Deploy successful!"
            pm2 status nekofolio-ui