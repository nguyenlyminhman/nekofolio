name: Deploy Nekofolio UI - Next.js Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  # =========================
  # CI - BUILD & TEST
  # =========================
  ci-build:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          retention-days: 1
          path: |
            .next
            public
            package.json
            package-lock.json
            next.config.js
            ecosystem.config.js

  # =========================
  # CD - DEPLOY TO EC2
  # =========================
  cd-deploy:
    needs: ci-build
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://man-nguyen.com

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build

      - name: Deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next/,public/,package.json,package-lock.json,next.config.js,ecosystem.config.js"
          target: "~/apps/nekofolio-ui"

      - name: Restart Next.js application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_DIR=~/apps/nekofolio-ui
            APP_NAME=nekofolio-ui

            echo "===== Go to app directory ====="
            cd $APP_DIR

            echo "===== Install production dependencies ====="
            npm ci --omit=dev

            echo "===== Ensure .env.production exists ====="
            if [ ! -f .env.production ]; then
              echo ".env.production not found!"
              exit 1
            fi

            echo "===== Start or Reload PM2 ====="
            if pm2 describe $APP_NAME > /dev/null 2>&1; then
              pm2 reload $APP_NAME
            else
              pm2 start ecosystem.config.js
            fi

            echo "===== Wait for app startup ====="
            sleep 10

            echo "===== Health check ====="
            curl -f http://localhost:3000 || {
              echo "Application health check failed!"
              pm2 logs $APP_NAME --lines 50 --nostream
              exit 1
            }

            echo "===== Save PM2 process ====="
            pm2 save

            echo "===== PM2 Status ====="
            pm2 status