name: Deploy Nekofolio UI - Next.js Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  # =========================
  # CI - BUILD & TEST
  # =========================
  ci-build:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Compress artifact
        run: |
          FILES=".next public package.json package-lock.json"
          [ -f next.config.js ] && FILES="$FILES next.config.js"
          [ -f next.config.ts ] && FILES="$FILES next.config.ts"
          [ -f next.config.mjs ] && FILES="$FILES next.config.mjs"
          [ -f ecosystem.config.js ] && FILES="$FILES ecosystem.config.js"
          [ -f ecosystem.config.cjs ] && FILES="$FILES ecosystem.config.cjs"
          tar -czf deploy.tar.gz $FILES

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          retention-days: 1
          path: deploy.tar.gz

  # =========================
  # CD - DEPLOY TO EC2
  # =========================
  cd-deploy:
    needs: ci-build
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://man-nguyen.com

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build

      - name: Copy archive to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "~/apps/nekofolio-ui"

      - name: Extract & Restart on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -euxo pipefail

            APP_DIR=~/apps/nekofolio-ui
            APP_NAME=nekofolio-ui

            echo "===== Go to app directory ====="
            cd $APP_DIR

            echo "===== Extract artifact ====="
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            echo "===== Verify .next exists ====="
            ls -la .next/

            echo "===== Node version ====="
            node -v
            npm -v

            echo "===== Install dependencies ====="
            npm install --omit=dev

            echo "===== PM2 status before ====="
            pm2 status || true

            echo "===== Delete old process if exists ====="
            pm2 delete $APP_NAME || true

            echo "===== Start Next.js ====="
            pm2 start npm \
              --name $APP_NAME \
              -- start

            echo "===== Wait app startup ====="
            sleep 10

            echo "===== PM2 logs ====="
            pm2 logs $APP_NAME --lines 50 --nostream || true

            echo "===== Health check ====="
            curl -f http://127.0.0.1:3000

            echo "===== Save PM2 ====="
            pm2 save

            echo "===== Final PM2 status ====="
            pm2 status